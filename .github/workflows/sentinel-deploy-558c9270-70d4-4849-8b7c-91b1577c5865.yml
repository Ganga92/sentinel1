name: Deploy Content to trainingwspace [558c9270-70d4-4849-8b7c-91b1577c5865]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-558c9270-70d4-4849-8b7c-91b1577c5865.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-558c9270-70d4-4849-8b7c-91b1577c5865.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'trainingrg'
      workspaceName: 'trainingwspace'
      workspaceId: 'ee89e6cd-6d02-4d6b-9b73-e5f15ff332ab'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule'
      branch: 'main'
      sourceControlId: '558c9270-70d4-4849-8b7c-91b1577c5865'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_558c927070d448498b7c91b1577c5865 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_558c927070d448498b7c91b1577c5865 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_558c927070d448498b7c91b1577c5865 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_558c927070d448498b7c91b1577c5865 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_558c927070d448498b7c91b1577c5865 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_558c927070d448498b7c91b1577c5865 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_558c927070d448498b7c91b1577c5865 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_558c927070d448498b7c91b1577c5865 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_558c927070d448498b7c91b1577c5865 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-558c9270-70d4-4849-8b7c-91b1577c5865.ps1